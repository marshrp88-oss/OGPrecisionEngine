openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Personal Finance Advisor API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: assumptions
    description: Financial assumptions / parameters
  - name: balances
    description: Account balances
  - name: bills
    description: Bills and recurring obligations
  - name: one-time-expenses
    description: One-time expenses
  - name: variable-spend
    description: Variable spend log
  - name: commissions
    description: Commission income tracking
  - name: wealth
    description: Wealth management (net worth snapshots, credit scores)
  - name: debt
    description: Debt tracking
  - name: retirement
    description: Retirement planning
  - name: scenarios
    description: Decision sandbox scenarios
  - name: playbook
    description: Methodology playbook
  - name: integrity
    description: Session integrity checks
  - name: dashboard
    description: Dashboard cycle computation
  - name: anthropic
    description: Anthropic AI advisor

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Assumptions ───────────────────────────────────────────────────────────
  /assumptions:
    get:
      operationId: getAssumptions
      tags: [assumptions]
      summary: Get all financial assumptions
      responses:
        "200":
          description: All assumptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assumption"
  /assumptions/{key}:
    put:
      operationId: updateAssumption
      tags: [assumptions]
      summary: Update a single assumption by key
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssumptionBody"
      responses:
        "200":
          description: Updated assumption
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assumption"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ─── Balances ──────────────────────────────────────────────────────────────
  /balances:
    get:
      operationId: getBalances
      tags: [balances]
      summary: Get current balances (latest per account)
      responses:
        "200":
          description: Current balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Balance"
    post:
      operationId: createBalance
      tags: [balances]
      summary: Record a new balance entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBalanceBody"
      responses:
        "201":
          description: Created balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Balance"
  /balances/history:
    get:
      operationId: getBalanceHistory
      tags: [balances]
      summary: Get balance history for all accounts
      parameters:
        - name: account_type
          in: query
          schema:
            type: string
        - name: days
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Balance history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Balance"

  # ─── Bills ─────────────────────────────────────────────────────────────────
  /bills:
    get:
      operationId: getBills
      tags: [bills]
      summary: Get all bills
      responses:
        "200":
          description: All bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bill"
    post:
      operationId: createBill
      tags: [bills]
      summary: Create a new bill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBillBody"
      responses:
        "201":
          description: Created bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
  /bills/{id}:
    get:
      operationId: getBill
      tags: [bills]
      summary: Get a single bill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateBill
      tags: [bills]
      summary: Update a bill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBillBody"
      responses:
        "200":
          description: Updated bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bill"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteBill
      tags: [bills]
      summary: Delete a bill
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ─── One-Time Expenses ─────────────────────────────────────────────────────
  /one-time-expenses:
    get:
      operationId: getOneTimeExpenses
      tags: [one-time-expenses]
      summary: Get all one-time expenses
      responses:
        "200":
          description: One-time expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OneTimeExpense"
    post:
      operationId: createOneTimeExpense
      tags: [one-time-expenses]
      summary: Create a one-time expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOneTimeExpenseBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OneTimeExpense"
  /one-time-expenses/{id}:
    patch:
      operationId: updateOneTimeExpense
      tags: [one-time-expenses]
      summary: Update a one-time expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOneTimeExpenseBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OneTimeExpense"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteOneTimeExpense
      tags: [one-time-expenses]
      summary: Delete a one-time expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ─── Variable Spend ────────────────────────────────────────────────────────
  /variable-spend:
    get:
      operationId: getVariableSpend
      tags: [variable-spend]
      summary: Get variable spend log
      parameters:
        - name: weeks
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Variable spend log
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VariableSpendEntry"
    post:
      operationId: createVariableSpendEntry
      tags: [variable-spend]
      summary: Log variable spend for a week
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVariableSpendBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariableSpendEntry"
  /variable-spend/{id}:
    patch:
      operationId: updateVariableSpendEntry
      tags: [variable-spend]
      summary: Update a variable spend entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVariableSpendBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VariableSpendEntry"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteVariableSpendEntry
      tags: [variable-spend]
      summary: Delete a variable spend entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ─── Commissions ──────────────────────────────────────────────────────────
  /commissions:
    get:
      operationId: getCommissions
      tags: [commissions]
      summary: Get commission history
      responses:
        "200":
          description: Commission records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Commission"
    post:
      operationId: createCommission
      tags: [commissions]
      summary: Create a commission entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommissionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commission"
  /commissions/{id}:
    patch:
      operationId: updateCommission
      tags: [commissions]
      summary: Update a commission entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommissionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commission"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteCommission
      tags: [commissions]
      summary: Delete a commission entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /commissions/summary:
    get:
      operationId: getCommissionSummary
      tags: [commissions]
      summary: Get commission summary (YTD, drought flag, 3-month avg)
      responses:
        "200":
          description: Commission summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionSummary"

  # ─── Wealth Management ─────────────────────────────────────────────────────
  /wealth/snapshots:
    get:
      operationId: getWealthSnapshots
      tags: [wealth]
      summary: Get wealth management monthly snapshots
      responses:
        "200":
          description: Wealth snapshots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WealthSnapshot"
    post:
      operationId: createWealthSnapshot
      tags: [wealth]
      summary: Create a wealth snapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWealthSnapshotBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WealthSnapshot"
  /wealth/snapshots/{id}:
    patch:
      operationId: updateWealthSnapshot
      tags: [wealth]
      summary: Update a wealth snapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWealthSnapshotBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WealthSnapshot"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteWealthSnapshot
      tags: [wealth]
      summary: Delete a wealth snapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /wealth/credit-scores:
    get:
      operationId: getCreditScores
      tags: [wealth]
      summary: Get credit score history
      responses:
        "200":
          description: Credit scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreditScore"
    post:
      operationId: createCreditScore
      tags: [wealth]
      summary: Record credit scores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreditScoreBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditScore"

  # ─── Debt ──────────────────────────────────────────────────────────────────
  /debt:
    get:
      operationId: getDebt
      tags: [debt]
      summary: Get all debt entries
      responses:
        "200":
          description: Debt entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Debt"
    post:
      operationId: createDebt
      tags: [debt]
      summary: Create a debt entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDebtBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debt"
  /debt/{id}:
    patch:
      operationId: updateDebt
      tags: [debt]
      summary: Update a debt entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDebtBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debt"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteDebt
      tags: [debt]
      summary: Delete a debt entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ─── Retirement ────────────────────────────────────────────────────────────
  /retirement:
    get:
      operationId: getRetirement
      tags: [retirement]
      summary: Get retirement planning inputs
      responses:
        "200":
          description: Retirement plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetirementPlan"
    put:
      operationId: upsertRetirement
      tags: [retirement]
      summary: Update retirement planning inputs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertRetirementBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetirementPlan"

  # ─── Decision Scenarios ────────────────────────────────────────────────────
  /scenarios:
    get:
      operationId: getScenarios
      tags: [scenarios]
      summary: Get all saved scenarios
      responses:
        "200":
          description: Scenarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scenario"
    post:
      operationId: createScenario
      tags: [scenarios]
      summary: Create or run a scenario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScenarioBody"
      responses:
        "201":
          description: Created with computed outputs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
  /scenarios/{id}:
    get:
      operationId: getScenario
      tags: [scenarios]
      summary: Get a scenario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateScenario
      tags: [scenarios]
      summary: Update a scenario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScenarioBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteScenario
      tags: [scenarios]
      summary: Delete a scenario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ─── Playbook ──────────────────────────────────────────────────────────────
  /playbook:
    get:
      operationId: getPlaybook
      tags: [playbook]
      summary: Get current playbook version
      responses:
        "200":
          description: Current playbook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybookVersion"
    put:
      operationId: updatePlaybook
      tags: [playbook]
      summary: Update playbook (creates new version)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlaybookBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybookVersion"
  /playbook/versions:
    get:
      operationId: getPlaybookVersions
      tags: [playbook]
      summary: Get all playbook versions
      responses:
        "200":
          description: Versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlaybookVersion"

  # ─── Session Integrity ─────────────────────────────────────────────────────
  /integrity/check:
    post:
      operationId: runIntegrityCheck
      tags: [integrity]
      summary: Run session integrity check (10 checks)
      responses:
        "200":
          description: Check results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrityCheckResult"
  /integrity/history:
    get:
      operationId: getIntegrityHistory
      tags: [integrity]
      summary: Get integrity check history
      responses:
        "200":
          description: History
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntegrityCheckResult"

  # ─── Dashboard ────────────────────────────────────────────────────────────
  /dashboard/cycle:
    get:
      operationId: getDashboardCycle
      tags: [dashboard]
      summary: Get current cycle dashboard computation
      responses:
        "200":
          description: Cycle dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardCycle"
  /dashboard/monthly-savings:
    get:
      operationId: getMonthlySavings
      tags: [dashboard]
      summary: Get monthly savings estimate
      responses:
        "200":
          description: Monthly savings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlySavings"

  # ─── Anthropic AI ─────────────────────────────────────────────────────────
  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"
  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # ─── Assumptions ─────────────────────────────────────────────────────────
    Assumption:
      type: object
      properties:
